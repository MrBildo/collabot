[models]
default = "claude-sonnet-4-6"

[models.aliases]
opus-latest = "claude-opus-4-6"
sonnet-latest = "claude-sonnet-4-6"
haiku-latest = "claude-haiku-4-5-20251001"

[defaults]
stallTimeoutSeconds = 300

[agent]
maxTurns = 50
maxBudgetUsd = 1.00

[logging]
level = "debug"     # minimal | debug | verbose

[slack]
taskRotationIntervalHours = 24

[slack.bots.hazel]
botTokenEnv = "HAZEL_BOT_TOKEN"
appTokenEnv = "HAZEL_APP_TOKEN"
role = "researcher"

[pool]
maxConcurrent = 3

[mcp]
streamTimeout = 600000    # CLAUDE_CODE_STREAM_CLOSE_TIMEOUT (ms)

[ws]
port = 9800
host = "127.0.0.1"
