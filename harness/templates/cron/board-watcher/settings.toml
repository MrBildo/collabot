# Board-to-project mappings. Each entry maps a Collaboard board
# to the project whose .agent.env has the COLLABOARD_AUTH_KEY.
#
# The handler checks each board for new activity since last run.
# Clean boards = zero agent cost. Dirty boards dispatch an agent
# with pre-filtered card context.

